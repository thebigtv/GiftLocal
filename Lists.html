<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiftLocal — Hexham</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <header class="site-header">
    <a href="index.html" class="site-header__mark">GiftLocal</a>
    <span class="site-header__place">Hexham</span>
  </header>

  <p class="intro">
    One gift list per person, filled with things from shops down the road —
    not another marketplace. Pick a name to see what's on their list.
  </p>

  <div id="tag-grid" class="tag-grid">
    <p class="empty-note">Loading gift lists…</p>
  </div>

</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
async function loadChildren() {
  const grid = document.getElementById('tag-grid');

  try {
    const res = await apiGet('children');

    if (!res.success) {
      grid.innerHTML = `<p class="empty-note">Couldn't load gift lists: ${escapeHtml(res.error)}</p>`;
      return;
    }

    if (!res.data.length) {
      grid.innerHTML = `<p class="empty-note">No gift lists yet.</p>`;
      return;
    }

    grid.innerHTML = res.data.map(child => `
      <a class="tag" href="child.html?token=${encodeURIComponent(child.Token)}">
        ${tagStringSvg()}
        <div class="tag__name">${escapeHtml(child.Name)}</div>
        <p class="tag__meta">Age ${escapeHtml(child.Age)}</p>
        <hr class="tag__divider">
        <p class="tag__footer">View list &rarr;</p>
      </a>
    `).join('');

  } catch (err) {
    grid.innerHTML = `<p class="empty-note">Something went wrong loading gift lists. Check your API_URL in config.js.</p>`;
  }
}

loadChildren();
</script>
</body>
</html>
