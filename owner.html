<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your gift list — GiftLocal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <header class="site-header">
    <a href="index.html" class="site-header__mark">GiftLocal</a>
    <span class="site-header__place">Hexham</span>
  </header>

  <div id="child-head">
    <p class="empty-note">Loading…</p>
  </div>

  <div id="share-block" class="share-block" style="display:none;">
    <p class="column__label">Share your list</p>
    <div class="share-block__row">
      <img id="qr-img" class="share-block__qr" alt="QR code linking to your gift list" width="140" height="140">
      <div class="share-block__actions">
        <button id="copy-link-btn" type="button" class="btn btn--ghost btn--small">Copy link</button>
        <button id="native-share-btn" type="button" class="btn btn--primary btn--small" style="display:none;">Share</button>
        <p id="share-msg" class="form-msg"></p>
      </div>
    </div>
  </div>

  <p class="column__label">Your list</p>
  <div id="wanted-list" class="item-list" style="margin-bottom: 40px;"></div>

  <div class="add-form">
    <p class="add-form__title">Add something to your list</p>
    <form id="add-form">
      <div class="field">
        <label for="item-name">Item</label>
        <input type="text" id="item-name" required placeholder="e.g. Jellycat Peanut">
      </div>
      <div class="field">
        <label for="item-shop">Shop</label>
        <select id="item-shop" required>
          <option value="">Loading shops…</option>
        </select>
      </div>
      <button type="submit" class="btn btn--primary">Add to my list</button>
      <p id="form-msg" class="form-msg"></p>
    </form>
  </div>

  <footer class="site-footer">
    <a href="#" id="staff-flip-link">Shop staff</a>
  </footer>

</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
const token = getQueryParam('token');
let shopsById = {};
let currentChildId = null;

function renderChildHead(child) {
  const el = document.getElementById('child-head');
  el.innerHTML = `
    <div class="child-head">
      <h1 class="child-head__name">Your gift list</h1>
    </div>
    <p class="child-head__interests">Hi ${escapeHtml(child.Name)} — anything on here is fair game for family and friends to buy. Add whatever you like.</p>
  `;
}

function setupShareBlock(child) {
  // Shares the owner's OWN link — never the ShareToken. This link is
  // already theirs to hold, so there's nothing sensitive in showing it
  // back to them or letting them pass it on to family/friends themselves.
  if (!token) return;

  const shareUrl = window.location.origin + '/owner.html?token=' + encodeURIComponent(token);
  const qrImg = document.getElementById('qr-img');
  qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=' + encodeURIComponent(shareUrl);

  document.getElementById('share-block').style.display = 'block';

  const copyBtn = document.getElementById('copy-link-btn');
  const shareMsg = document.getElementById('share-msg');

  copyBtn.onclick = async () => {
    try {
      await navigator.clipboard.writeText(shareUrl);
      shareMsg.textContent = 'Link copied.';
      shareMsg.className = 'form-msg form-msg--ok';
    } catch (err) {
      shareMsg.textContent = shareUrl;
      shareMsg.className = 'form-msg';
    }
  };

  const nativeShareBtn = document.getElementById('native-share-btn');
  if (navigator.share) {
    nativeShareBtn.style.display = 'inline-block';
    nativeShareBtn.onclick = async () => {
      try {
        await navigator.share({
          title: child.Name + '\u2019s gift list',
          text: 'Here\u2019s ' + child.Name + '\u2019s gift list on GiftLocal',
          url: shareUrl
        });
      } catch (err) {
        // user cancelled — nothing to do
      }
    };
  }
}

function itemCard(item) {
  const shopName = shopsById[item.ShopID] || item.ShopID || 'Shop not set';

  return `
    <div class="tag tag--item">
      ${tagStringSvg()}
      <div class="tag__item-name">${escapeHtml(item.Name)}</div>
      <p class="tag__shop">${escapeHtml(shopName)}</p>
      <button class="btn btn--ghost btn--small" data-already-have="${escapeHtml(item.ItemID)}">I have this now</button>
    </div>
  `;
}

function renderItems(wanted) {
  const wantedEl = document.getElementById('wanted-list');

  wantedEl.innerHTML = wanted.length
    ? wanted.map(i => itemCard(i)).join('')
    : `<p class="empty-note">Nothing on your list yet — add something below.</p>`;

  wantedEl.querySelectorAll('[data-already-have]').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.disabled = true;
      btn.textContent = 'Removing…';
      markAlreadyHave(btn.getAttribute('data-already-have'), btn);
    });
  });
}

async function markAlreadyHave(itemId, btn) {
  try {
    const res = await apiPost('markAlreadyHave', { itemId });
    if (res.success) {
      loadChild();
    } else {
      alert('Could not update that item: ' + res.error);
      if (btn) { btn.disabled = false; btn.textContent = 'I have this now'; }
    }
  } catch (err) {
    alert('Something went wrong updating that item.');
    if (btn) { btn.disabled = false; btn.textContent = 'I have this now'; }
  }
}

async function loadShops() {
  const select = document.getElementById('item-shop');
  try {
    let shopsData = sessionStorage.getItem('gl_shops');

    if (!shopsData) {
      const res = await apiGet('shops');
      if (!res.success || !res.data.length) {
        select.innerHTML = `<option value="">No shops set up yet</option>`;
        return;
      }
      shopsData = JSON.stringify(res.data);
      sessionStorage.setItem('gl_shops', shopsData);
    }

    const shops = JSON.parse(shopsData);
    shopsById = {};
    shops.forEach(shop => { shopsById[shop.ShopID] = shop.ShopName; });

    select.innerHTML = shops.map(shop =>
      `<option value="${escapeHtml(shop.ShopID)}">${escapeHtml(shop.ShopName)}</option>`
    ).join('');

    if (window.__lastWanted) {
      renderItems(window.__lastWanted);
    }
  } catch (err) {
    select.innerHTML = `<option value="">Couldn't load shops</option>`;
  }
}

async function loadChild() {
  if (!token) {
    document.getElementById('child-head').innerHTML = `<p class="empty-note">No list selected.</p>`;
    return;
  }

  try {
    const res = await apiGet('childByToken', { token: token });

    if (!res.success) {
      document.getElementById('child-head').innerHTML = `<p class="empty-note">${escapeHtml(res.error)}</p>`;
      return;
    }

    currentChildId = res.data.child.ChildID;
    window.__lastChild = res.data.child;
    renderChildHead(res.data.child);
    setupShareBlock(res.data.child);
    window.__lastWanted = res.data.wanted;
    renderItems(res.data.wanted);

  } catch (err) {
    document.getElementById('child-head').innerHTML = `<p class="empty-note">Something went wrong loading your list.</p>`;
  }
}

document.getElementById('add-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('form-msg');
  const submitBtn = e.target.querySelector('button[type="submit"]');
  const name = document.getElementById('item-name').value.trim();
  const shopId = document.getElementById('item-shop').value;

  if (!currentChildId) {
    msg.textContent = 'List not loaded yet — please wait a moment and try again.';
    msg.className = 'form-msg form-msg--error';
    return;
  }

  if (!name || !shopId) {
    msg.textContent = 'Please add an item name and choose a shop.';
    msg.className = 'form-msg form-msg--error';
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Adding…';
  msg.textContent = '';
  msg.className = 'form-msg';

  try {
    const res = await apiPost('addWanted', { childId: currentChildId, shopId, name, addedBy: 'Me' });
    if (res.success) {
      msg.textContent = 'Added to your list.';
      msg.className = 'form-msg form-msg--ok';
      document.getElementById('item-name').value = '';
      loadChild();
    } else {
      msg.textContent = res.error || 'Could not add that item.';
      msg.className = 'form-msg form-msg--error';
    }
  } catch (err) {
    msg.textContent = 'Something went wrong adding that item.';
    msg.className = 'form-msg form-msg--error';
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Add to my list';
  }
});

loadShops();
loadChild();

document.getElementById('staff-flip-link').addEventListener('click', async (e) => {
  e.preventDefault();
  const pin = prompt('Staff PIN:');
  if (!pin) return;

  try {
    const res = await apiGet('verifyStaffKey', { key: pin });
    if (res.success && window.__lastChild && window.__lastChild.ShareToken) {
      window.location.href = 'child.html?share=' + encodeURIComponent(window.__lastChild.ShareToken);
    } else {
      alert('Incorrect PIN.');
    }
  } catch (err) {
    alert('Something went wrong checking the PIN.');
  }
});
</script>
</body>
</html>
