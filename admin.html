<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — GiftLocal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <header class="site-header">
    <a href="index.html" class="site-header__mark">GiftLocal</a>
    <span class="site-header__place">Admin</span>
  </header>

  <div id="login-box" class="add-form" style="max-width: 360px;">
    <p class="add-form__title">Enter admin password</p>
    <form id="login-form">
      <div class="field">
        <label for="admin-password">Password</label>
        <input type="password" id="admin-password" required>
      </div>
      <button type="submit" class="btn btn--primary">Unlock</button>
      <p id="login-msg" class="form-msg"></p>
    </form>
  </div>

  <div id="pending-section" style="display:none;">
    <p class="column__label">Pending approval</p>
    <div id="pending-list" class="item-list" style="margin-bottom: 40px;"></div>
  </div>

  <div id="tag-grid" class="tag-grid" style="display:none;"></div>

</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
async function loadPending(key) {
  const section = document.getElementById('pending-section');
  const list = document.getElementById('pending-list');

  try {
    const res = await apiGet('adminPending', { key });

    if (!res.success) return; // main loadChildren() call will handle bad-password messaging

    if (!res.data.length) {
      section.style.display = 'none';
      return;
    }

    section.style.display = 'block';
    list.innerHTML = res.data.map(child => `
      <div class="tag tag--item">
        ${tagStringSvg()}
        <div class="tag__item-name">${escapeHtml(child.Name)}</div>
        <p class="tag__shop">Age ${escapeHtml(child.Age)}${child.Interests ? ' &middot; ' + escapeHtml(child.Interests) : ''}</p>
        <button class="btn btn--primary btn--small" data-approve="${escapeHtml(child.ChildID)}">Approve</button>
      </div>
    `).join('');

    list.querySelectorAll('[data-approve]').forEach(btn => {
      btn.addEventListener('click', () => approveChild(btn.getAttribute('data-approve'), btn, key));
    });

  } catch (err) {
    // fail quietly here — the main children list will surface any real problem
  }
}

async function approveChild(childId, btn, key) {
  btn.disabled = true;
  btn.textContent = 'Approving…';

  try {
    const res = await apiPost('approveChild', { childId, key });
    if (res.success) {
      loadPending(key);
      loadChildren(key);
    } else {
      alert('Could not approve: ' + res.error);
      btn.disabled = false;
      btn.textContent = 'Approve';
    }
  } catch (err) {
    alert('Something went wrong approving that list.');
    btn.disabled = false;
    btn.textContent = 'Approve';
  }
}

async function loadChildren(key) {
  const grid = document.getElementById('tag-grid');
  grid.style.display = 'grid';
  grid.innerHTML = `<p class="empty-note">Loading gift lists…</p>`;

  try {
    const res = await apiGet('adminChildren', { key });

    if (!res.success) {
      // Wrong password — clear it and show the login box again
      sessionStorage.removeItem('gl_admin_key');
      document.getElementById('login-box').style.display = 'block';
      grid.style.display = 'none';
      document.getElementById('login-msg').textContent = 'Incorrect password.';
      document.getElementById('login-msg').className = 'form-msg form-msg--error';
      return;
    }

    if (!res.data.length) {
      grid.innerHTML = `<p class="empty-note">No gift lists yet.</p>`;
      return;
    }

    grid.innerHTML = res.data.map(child => `
      <a class="tag" href="child.html?token=${encodeURIComponent(child.Token)}">
        ${tagStringSvg()}
        <div class="tag__name">${escapeHtml(child.Name)}</div>
        <p class="tag__meta">Age ${escapeHtml(child.Age)}</p>
        <hr class="tag__divider">
        <p class="tag__footer">View list &rarr;</p>
      </a>
    `).join('');

  } catch (err) {
    grid.innerHTML = `<p class="empty-note">Something went wrong loading gift lists.</p>`;
  }
}

document.getElementById('login-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const key = document.getElementById('admin-password').value;
  sessionStorage.setItem('gl_admin_key', key);
  document.getElementById('login-box').style.display = 'none';
  loadPending(key);
  loadChildren(key);
});

// If already unlocked earlier this session, skip straight to the list
const savedKey = sessionStorage.getItem('gl_admin_key');
if (savedKey) {
  document.getElementById('login-box').style.display = 'none';
  loadPending(savedKey);
  loadChildren(savedKey);
}
</script>
</body>
</html>
