<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop staff — GiftLocal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <header class="site-header">
    <a href="index.html" class="site-header__mark">GiftLocal</a>
    <span class="site-header__place">Shop staff</span>
  </header>

  <div id="login-box" class="add-form" style="max-width: 360px;">
    <p class="add-form__title">Enter staff PIN</p>
    <form id="login-form">
      <div class="field">
        <label for="staff-pin">PIN</label>
        <input type="password" id="staff-pin" required>
      </div>
      <button type="submit" class="btn btn--primary">Unlock</button>
      <p id="login-msg" class="form-msg"></p>
    </form>
  </div>

  <div id="staff-area" style="display:none;">

    <div class="add-form">
      <p class="add-form__title">Find a list</p>
      <form id="search-form">
        <div class="field">
          <label for="search-name">Name</label>
          <input type="text" id="search-name" required placeholder="Start typing a name…">
        </div>
        <button type="submit" class="btn btn--primary">Search</button>
        <p id="search-msg" class="form-msg"></p>
      </form>
      <div id="search-results" class="item-list" style="margin-top: 16px;"></div>
    </div>

    <div class="add-form">
      <p class="add-form__title">Add a list in-store</p>
      <form id="add-child-form">
        <div class="field">
          <label for="new-name">Name</label>
          <input type="text" id="new-name" required placeholder="Who is this list for?">
        </div>
        <div class="field">
          <label for="new-age">Age (optional)</label>
          <input type="text" id="new-age" placeholder="e.g. 8">
        </div>
        <div class="field">
          <label for="new-interests">Interests (optional)</label>
          <input type="text" id="new-interests" placeholder="e.g. dinosaurs, drawing">
        </div>
        <button type="submit" class="btn btn--primary">Create list</button>
        <p id="add-msg" class="form-msg"></p>
      </form>
      <div id="new-list-result"></div>
    </div>

  </div>

</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
let staffKey = null;

function unlock(key) {
  staffKey = key;
  sessionStorage.setItem('gl_staff_key', key);
  document.getElementById('login-box').style.display = 'none';
  document.getElementById('staff-area').style.display = 'block';
}

document.getElementById('login-form').addEventListener('submit', (e) => {
  e.preventDefault();
  unlock(document.getElementById('staff-pin').value);
});

const savedKey = sessionStorage.getItem('gl_staff_key');
if (savedKey) unlock(savedKey);

// ---------- Search ----------

document.getElementById('search-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('search-msg');
  const results = document.getElementById('search-results');
  const query = document.getElementById('search-name').value.trim();

  if (!query) return;

  msg.textContent = 'Searching…';
  msg.className = 'form-msg';
  results.innerHTML = '';

  try {
    const res = await apiGet('staffSearch', { key: staffKey, q: query });

    if (!res.success) {
      msg.textContent = res.error;
      msg.className = 'form-msg form-msg--error';
      return;
    }

    msg.textContent = '';

    if (!res.data.length) {
      results.innerHTML = `<p class="empty-note">No matching lists found.</p>`;
      return;
    }

    results.innerHTML = res.data.map(child => `
      <a class="tag tag--item" style="text-decoration:none;" href="child.html?share=${encodeURIComponent(child.ShareToken)}" target="_blank" rel="noopener">
        ${tagStringSvg()}
        <div class="tag__item-name">${escapeHtml(child.Name)}</div>
        <p class="tag__shop">Age ${escapeHtml(child.Age)}</p>
      </a>
    `).join('');

  } catch (err) {
    msg.textContent = 'Something went wrong searching.';
    msg.className = 'form-msg form-msg--error';
  }
});

// ---------- Add in-store ----------

document.getElementById('add-child-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('add-msg');
  const submitBtn = e.target.querySelector('button[type="submit"]');
  const resultBox = document.getElementById('new-list-result');

  const name = document.getElementById('new-name').value.trim();
  const age = document.getElementById('new-age').value.trim();
  const interests = document.getElementById('new-interests').value.trim();

  if (!name) {
    msg.textContent = 'Please enter a name.';
    msg.className = 'form-msg form-msg--error';
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Creating…';
  msg.textContent = '';
  resultBox.innerHTML = '';

  try {
    const res = await apiPost('addChildInStore', { name, age, interests, key: staffKey });

    if (res.success) {
      msg.textContent = 'List created and live.';
      msg.className = 'form-msg form-msg--ok';
      const shareUrl = window.location.origin + '/owner.html?token=' + encodeURIComponent(res.data.Token);
      resultBox.innerHTML = `
        <p class="empty-note" style="font-style:normal;">
          <a href="${shareUrl}" target="_blank" rel="noopener" style="color: var(--gold);">${shareUrl}</a>
        </p>
      `;
      document.getElementById('new-name').value = '';
      document.getElementById('new-age').value = '';
      document.getElementById('new-interests').value = '';
    } else {
      msg.textContent = res.error || 'Could not create that list.';
      msg.className = 'form-msg form-msg--error';
    }
  } catch (err) {
    msg.textContent = 'Something went wrong creating that list.';
    msg.className = 'form-msg form-msg--error';
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Create list';
  }
});
</script>
</body>
</html>
